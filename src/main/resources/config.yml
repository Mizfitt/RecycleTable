# ==============================================================
#  ♻️ Recycle Table - Configuration File
#  Author: Mizfit
#  Description:
#    Controls all plugin behavior including recyclables,
#    processing times, enchantment returns, hoppers,
#    overflow behavior, and dynamic complexity balancing.
# ==============================================================


# ==============================================================
# 🔒 ITEM BLACKLIST
# --------------------------------------------------------------
# Items listed here cannot be recycled. Use Material names.
# Example: [BEDROCK, COMMAND_BLOCK, RECYCLING_TABLE]
# ==============================================================
blacklist: []


# ==============================================================
# ⚙️ HOPPER BEHAVIOR
# --------------------------------------------------------------
# Allow hoppers to interact with recycling tables.
# Input:  If true, hoppers can insert recyclable items.
# Output: If true, hoppers can pull finished materials.
# ==============================================================
hopper:
  allow-input: true
  allow-output: true


# ==============================================================
# ⏱️ PROCESSING SETTINGS
# --------------------------------------------------------------
# speed-multiplier: Adjusts all recycling times globally.
#   (Higher = faster processing)
#
# session-expire-ms: Milliseconds before inactive sessions expire.
#   Default = 24 hours (86400000 ms)
# ==============================================================
processing:
  speed-multiplier: 1.0
  session-expire-ms: 86400000


# ==============================================================
# ✨ ENCHANTMENT EXTRACTION
# --------------------------------------------------------------
# enabled: Whether enchantment book extraction is active.
# return-single-level: Return books for 1-level enchantments
#                      (e.g., Mending, Infinity)
# return-multi-level:  Return books for multi-level enchantments
#                      but reduced by one level (Fortune III → II)
# ==============================================================
enchantments:
  enabled: true
  return-single-level: true
  return-multi-level: true


# ==============================================================
# 📦 OVERFLOW STORAGE
# --------------------------------------------------------------
# When the recycler’s output is full, items are sent here.
#
# repopulate-delay: How long (in seconds) to wait before
#                   attempting to refill after items are removed.
# ==============================================================
overflow:
  repopulate-delay: 3.0  # seconds
  max-items: 500         # max total items stored in overflow per table (prevents memory abuse)


# ==============================================================
# 🧠 COMPLEXITY CALCULATOR
# --------------------------------------------------------------
# Determines how long each item takes to recycle based on
# rarity, crafting depth, dimension origin, and other traits.
# ==============================================================
complexity:

  # Time range for recycling (in seconds)
  min-seconds: 15       # 15 seconds (e.g. dirt, wood)
  max-seconds: 10800    # 3 hours    (e.g. netherite gear)

  # How much rarity vs. recipe depth each contribute (should sum to 1.0)
  base-rarity-weight: 0.5
  base-difficulty-weight: 0.5

  # Smoothing factor — higher = more stable, less reactive to analytics (0.0-1.0)
  smoothing: 0.3

  # Max recipe depth to scan when estimating crafting complexity
  max-depth: 6

  # Extra complexity for smelted items (ingots, glass, cooked food, etc.)
  smelting-bias: 0.15

  # Extra complexity for unstackable items (armor, tools, etc.)
  unstackable-bias: 0.1

  # Dimension origin bonuses
  dimension-bias-overworld: 0.0
  dimension-bias-nether: 0.15
  dimension-bias-end: 0.25


# ==============================================================
# 📊 ANALYTICS & AUTO-REBALANCING
# --------------------------------------------------------------
# The plugin tracks which items players recycle to gently
# adjust complexity over time and keep things balanced.
# ==============================================================
analytics:

  # Whether analytics tracking is active at all
  enabled: true

  # How often (in seconds) analytics data is saved to disk
  save-interval-seconds: 300   # 5 minutes

  # How fast old usage data fades out each save cycle (0.0-1.0)
  # Lower = data persists longer; higher = reacts faster to recent trends
  decay-rate: 0.05

  # How much analytics can shift complexity scores (0.0-1.0)
  # Lower = more stable times; higher = more adaptive
  rebalance-weight: 0.25

  # How much observed recipe depth influences complexity
  depth-weight: 0.4

  # How much item usage frequency influences complexity
  usage-weight: 0.6


# ==============================================================
# 💾 END OF CONFIGURATION
# --------------------------------------------------------------
# Changes to this file require a /recycletable reload
# or server restart to take effect.
# ==============================================================